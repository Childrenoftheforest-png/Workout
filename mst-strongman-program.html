<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MST Systems — Enter Strongman</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --black: #0d0d0d;
    --dark: #161616;
    --card: #1e1e1e;
    --border: #2e2e2e;
    --accent: #e8c84a;
    --accent2: #c44a2a;
    --text: #e8e4de;
    --muted: #888;
    --green: #4aac6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--dark);
    border-bottom: 3px solid var(--accent);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 12px 60px;
  }

  /* Week selector */
  .week-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .week-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .week-btn:hover { border-color: var(--accent); color: var(--accent); }
  .week-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--black);
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
  }

  .day-tab {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    padding: 10px 18px;
    cursor: pointer;
    white-space: nowrap;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .day-tab:hover { color: var(--text); }
  .day-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .day-panel {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    overflow: hidden;
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: #111;
  }

  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #242424;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(232,200,74,0.04); }

  tbody td {
    padding: 10px 12px;
    vertical-align: top;
    line-height: 1.45;
  }

  .exercise-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .exercise-detail {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-style: italic;
  }

  .badge {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--accent);
    white-space: nowrap;
  }

  .weight-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--green);
    white-space: nowrap;
  }

  .rest-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .notes-cell {
    font-size: 12px;
    color: #aaa;
    max-width: 280px;
    line-height: 1.5;
  }

  .notes-cell ul {
    padding-left: 14px;
    margin-top: 4px;
  }

  .notes-cell li {
    margin-bottom: 2px;
  }

  /* Log input */
  .log-cell {
    white-space: nowrap;
    min-width: 130px;
  }

  .log-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .log-input {
    background: #111;
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 5px 8px;
    border-radius: 3px;
    width: 80px;
    transition: border-color 0.15s;
    outline: none;
  }

  .log-input::placeholder { color: #444; font-weight: 400; font-size: 12px; }
  .log-input:focus { border-color: var(--accent); }
  .log-input.saved { border-color: var(--green); color: var(--green); }

  .log-btn {
    background: var(--border);
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 5px 9px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .log-btn:hover { background: var(--accent); color: var(--black); }
  .log-btn.saved-btn { background: rgba(74,172,110,0.15); color: var(--green); }

  .log-note {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }

  /* Week button with logged indicator */
  .week-btn .logged-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--green);
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
    margin-top: -2px;
  }

  .new-cue {
    display: inline-block;
    background: rgba(196,74,42,0.15);
    color: var(--accent2);
    font-size: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Week summary bar */
  .week-summary {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .week-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.02em;
    color: var(--text);
    line-height: 1;
  }

  .week-theme {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    border-left: 2px solid var(--border);
    padding-left: 10px;
    margin-left: 2px;
    align-self: center;
  }

  /* Key section */
  .key-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--dark);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 11px;
    color: var(--muted);
  }

  .key-item { display: flex; align-items: center; gap: 5px; }
  .key-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* Mobile adjustments */
  @media (max-width: 600px) {
    .notes-cell { display: none; }
    .notes-col { display: none; }
    .day-tab { padding: 10px 12px; font-size: 12px; }
    .log-input { width: 65px; }
  }
</style>
</head>

const dayLabels = ["Day 1 — Pull", "Day 2 — Press", "Day 3 — Squat / DL", "Day 4 — Events"];

let currentWeek = 1;
let currentDay = 1;

// In-memory log cache: key -> {weight, note}
const logCache = {};

function storageKey(w, d, i) {
  return `mst:w${w}d${d}e${i}`;
}

async function loadAllLogs() {
  try {
    const keys = await window.storage.list('mst:');
    if (keys && keys.keys) {
      for (const k of keys.keys) {
        try {
          const res = await window.storage.get(k);
          if (res) logCache[k] = JSON.parse(res.value);
        } catch(e) {}
      }
    }
  } catch(e) {}
}

async function saveLog(w, d, i, weight, note) {
  const k = storageKey(w, d, i);
  const val = { weight, note };
  logCache[k] = val;
  try {
    await window.storage.set(k, JSON.stringify(val));
  } catch(e) {}
}

function getLog(w, d, i) {
  return logCache[storageKey(w, d, i)] || null;
}

function weekHasLog(w) {
  return Object.keys(logCache).some(k => k.startsWith(`mst:w${w}d`));
}

function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  for (let w = 1; w <= 8; w++) {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (w === currentWeek ? ' active' : '');
    const dot = weekHasLog(w) ? '<span class="logged-dot"></span>' : '';
    btn.innerHTML = `W${w}${dot}`;
    btn.onclick = () => { currentWeek = w; render(); };
    nav.appendChild(btn);
  }
}

function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  for (let d = 1; d <= 4; d++) {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (d === currentDay ? ' active' : '');
    tab.textContent = dayLabels[d-1];
    tab.onclick = () => { currentDay = d; render(); };
    tabs.appendChild(tab);
  }
}

function renderTable() {
  const panel = document.getElementById('dayPanel');
  const exercises = program[currentWeek][currentDay];

  panel.innerHTML = '';

  const table = document.createElement('table');
  table.innerHTML = `<thead><tr>
    <th>Exercise</th>
    <th>Sets × Reps</th>
    <th>Target</th>
    <th>Rest</th>
    <th>Logged Weight</th>
    <th class="notes-col">Key Notes</th>
  </tr></thead>`;

  const tbody = document.createElement('tbody');

  exercises.forEach(([ex, mod, sr, weight, rest, notes, isNew], i) => {
    const saved = getLog(currentWeek, currentDay, i);
    const noteHtml = notes
      ? notes.split('. ').filter(Boolean).map(n => `<li>${n}.</li>`).join('')
      : '';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="exercise-name">${ex}${isNew ? '<span class="new-cue">New Cue</span>' : ''}</div>
        ${mod ? `<div class="exercise-detail">${mod}</div>` : ''}
      </td>
      <td><span class="badge">${sr}</span></td>
      <td><span class="weight-cell">${weight}</span></td>
      <td><span class="rest-cell">${rest}</span></td>
      <td class="log-cell">
        <div class="log-wrap">
          <input
            class="log-input ${saved ? 'saved' : ''}"
            type="text"
            placeholder="e.g. 80kg"
            value="${saved ? saved.weight : ''}"
            id="inp-${i}"
          />
          <button class="log-btn ${saved ? 'saved-btn' : ''}" id="btn-${i}">
            ${saved ? '✓' : 'Log'}
          </button>
        </div>
        <input
          class="log-input"
          type="text"
          placeholder="Notes (optional)"
          value="${saved && saved.note ? saved.note : ''}"
          id="note-${i}"
          style="margin-top:5px; width:100%; font-size:11px; font-weight:400; font-style:italic;"
        />
      </td>
      <td class="notes-cell">${noteHtml ? `<ul>${noteHtml}</ul>` : ''}</td>
    `;
    tbody.appendChild(tr);

    // After appending, wire up the button
    setTimeout(() => {
      const btn = document.getElementById(`btn-${i}`);
      const inp = document.getElementById(`inp-${i}`);
      const noteInp = document.getElementById(`note-${i}`);
      if (!btn || !inp) return;

      const doSave = async () => {
        const val = inp.value.trim();
        if (!val) return;
        const noteVal = noteInp ? noteInp.value.trim() : '';
        await saveLog(currentWeek, currentDay, i, val, noteVal);
        inp.classList.add('saved');
        btn.textContent = '✓';
        btn.classList.add('saved-btn');
        renderWeekNav(); // update dot indicators
      };

      btn.addEventListener('click', doSave);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });
    }, 0);
  });

  table.appendChild(tbody);
  panel.appendChild(table);
}

function render() {
  renderWeekNav();
  renderDayTabs();
  document.getElementById('weekLabel').textContent = `Week ${currentWeek}`;
  document.getElementById('weekTheme').textContent = weekThemes[currentWeek-1];
  renderTable();
}

// Boot: load all saved logs first, then render
loadAllLogs().then(() => render());
</script>
