<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12-Week Strength — Squat / Bench / DL / OHP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
:root{--bg:#0d0d0d;--dark:#161616;--card:#1e1e1e;--border:#2e2e2e;--acc:#e8c84a;--red:#c44a2a;--text:#e8e4de;--muted:#777;--green:#4aac6e;--blue:#5a8fd0;--orange:#d47c2a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--dark);border-bottom:3px solid var(--acc);padding:13px 20px;position:sticky;top:0;z-index:100}
.hdr{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:.04em;color:var(--acc);text-transform:uppercase}
.logsub{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-left:8px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.max-chip{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:3px;background:rgba(74,172,110,.13);color:var(--green);white-space:nowrap}
.setup-btn{background:var(--card);border:1.5px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap}
.setup-btn:hover{border-color:var(--acc);color:var(--acc)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.mbox{background:var(--dark);border:1.5px solid var(--border);border-radius:6px;width:100%;max-width:480px;overflow:hidden}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border)}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--acc)}
.mclose{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:2px 4px}
.mclose:hover{color:var(--text)}
.mbody{padding:18px 20px}
.mnote{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfield{display:flex;flex-direction:column;gap:3px}
.mlabel{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text)}
.msub{font-size:11px;color:#555;line-height:1.3}
.mwrap{display:flex;align-items:center;background:#111;border:1.5px solid var(--border);border-radius:3px;overflow:hidden;margin-top:2px}
.mwrap:focus-within{border-color:var(--acc)}
.minput{background:none;border:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;font-weight:500;padding:7px 10px;width:100%;outline:none}
.munit{color:var(--muted);font-size:12px;padding:0 10px 0 0;flex-shrink:0}
.mfoot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.clearbtn{background:none;border:1px solid #333;color:var(--muted);font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;cursor:pointer;border-radius:3px}
.clearbtn:hover{border-color:var(--red);color:var(--red)}
.savebtn{background:var(--acc);color:#111;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:.08em;text-transform:uppercase;border:none;padding:8px 22px;cursor:pointer;border-radius:3px}
.savebtn:hover{background:#f0d550}
.main{max-width:980px;margin:0 auto;padding:18px 12px 60px}
.prompt-bar{background:rgba(232,200,74,.07);border:1px solid rgba(232,200,74,.2);border-radius:4px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--acc);cursor:pointer}
.prompt-bar:hover{background:rgba(232,200,74,.12)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;padding:8px 0;border-bottom:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.week-nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.wbtn{background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;padding:5px 12px;cursor:pointer;border-radius:3px;transition:all .15s;text-transform:uppercase}
.wbtn:hover{border-color:var(--acc);color:var(--acc)}
.wbtn.on{background:var(--acc);border-color:var(--acc);color:#111}
.wsummary{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.wlabel{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--text)}
.phase-badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:3px}
.ph-0{background:rgba(232,200,74,.15);color:var(--acc)}
.ph-1{background:rgba(90,143,208,.15);color:var(--blue)}
.ph-2{background:rgba(196,74,42,.15);color:var(--red)}
.ph-3{background:rgba(74,172,110,.15);color:var(--green)}
.wtheme{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
.day-tabs{display:flex;border-bottom:2px solid var(--border);overflow-x:auto}
.dtab{background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;padding:9px 16px;cursor:pointer;white-space:nowrap;text-transform:uppercase;transition:all .15s}
.dtab:hover{color:var(--text)}
.dtab.on{color:var(--acc);border-bottom-color:var(--acc)}
.dpanel{background:var(--card);border:1.5px solid var(--border);border-top:none;border-radius:0 0 4px 4px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:460px}
thead{background:#111}
th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid #222}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(232,200,74,.03)}
td{padding:10px 12px;vertical-align:top}
.exname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--text)}
.exmod{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px}
.nbdg{display:inline-block;background:rgba(90,143,208,.2);color:var(--blue);font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;padding:1px 5px;border-radius:2px;text-transform:uppercase;margin-left:5px;vertical-align:middle}
.srbdg{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--acc);white-space:nowrap}
.ckg{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--green);line-height:1}
.cpct{font-size:11px;color:#555;margin-top:2px}
.nomax{font-size:12px;color:#555}
.addmax{background:none;border:none;color:var(--acc);font-size:11px;cursor:pointer;padding:0;text-decoration:underline;display:block;margin-top:3px;font-family:'Barlow',sans-serif}
.rpebdg{display:inline-block;background:rgba(90,143,208,.15);color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;padding:2px 6px;border-radius:2px;text-transform:uppercase;margin-bottom:5px}
.bagkg{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--orange);line-height:1;margin-bottom:5px}
.testkg{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--green);margin-bottom:5px}
.loginput{background:#111;border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:5px 8px;width:82px;border-radius:2px;outline:none;display:block}
.loginput:focus{border-color:var(--acc)}
.loginput::placeholder{color:#3a3a3a}
.loginput-txt{width:100px}
.prevlog{font-size:11px;color:#555;margin-top:4px}
.bwtag{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted)}
.restcell{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);white-space:nowrap}
.notecell{font-size:12px;color:#999;line-height:1.5;max-width:260px}
@media(max-width:600px){.notecell{display:none}.logsub{display:none}}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <div>
      <span class="logo">12-Week Strength</span>
      <span class="logsub">Squat &middot; Bench &middot; Deadlift &middot; OHP</span>
    </div>
    <div class="hdr-right">
      <div id="maxesBar"></div>
      <button class="setup-btn" onclick="openModal()">&#9881; 1RM Setup</button>
    </div>
  </div>
</header>

<div id="overlay" class="overlay">
  <div class="mbox">
    <div class="mhead">
      <span class="mtitle">Your 1 Rep Maxes</span>
      <button class="mclose" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="mbody">
      <p class="mnote">Training weights are auto-calculated from these and rounded to the nearest 2.5kg. Update any time to recalculate.</p>
      <div class="mgrid" id="mgrid"></div>
    </div>
    <div class="mfoot">
      <button class="clearbtn" onclick="clearLogs()">Clear all logs</button>
      <button class="savebtn" onclick="saveAndClose()">Save</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="promptBar"></div>
  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:var(--green)"></span>Calculated from max</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--acc)"></span>Sets x Reps</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--blue)"></span>Log what you used</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--orange)"></span>Sandbag</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--green)"></span>Test week</span>
  </div>
  <div class="week-nav" id="weekNav"></div>
  <div class="wsummary">
    <span class="wlabel" id="wLabel"></span>
    <span id="phaseBadge" class="phase-badge"></span>
    <span class="wtheme" id="wTheme"></span>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="dpanel" id="dayPanel"></div>
</div>

<script>
var MAXCFG=[
  {k:'sq',    label:'Squat',       sub:'Back squat 1RM'},
  {k:'bench', label:'Bench Press', sub:'Flat bench 1RM'},
  {k:'dl',    label:'Deadlift',    sub:'Conventional DL 1RM'},
  {k:'ohp',   label:'OHP',         sub:'Strict overhead press 1RM'},
];
var MAXFULL={sq:'Squat',dl:'Deadlift',bench:'Bench',ohp:'OHP'};
var MAXSHORT={sq:'SQ',bench:'Bench',dl:'DL',ohp:'OHP'};
var THEMES=[
  'Foundation — establish your positions',
  'Foundation — drill the basics',
  'Foundation — add load, maintain standards',
  'Foundation — strong finish before the step up',
  'Build — heavier loads, same standards',
  'Build — consistency over everything',
  'Build — pushing the range',
  'Build — peak of the build phase',
  'Peak — low volume, high intensity',
  'Peak — finding your limits',
  'Peak — final heavy week',
  'Test week — find your true maxes',
];
var DLABELS=['Day 1 — Squat','Day 2 — Bench','Day 3 — Deadlift','Day 4 — OHP + Sandbag'];
var PHASE_LABELS=['Foundation','Build','Peak','Test'];

var CW=1,CD=1;

function gmx(){try{return JSON.parse(localStorage.getItem('s12_mx')||'{}')}catch{return{}}}
function smx(m){localStorage.setItem('s12_mx',JSON.stringify(m))}
function glog(k){return localStorage.getItem('s12_lg_'+k)||''}
function slog(k,v){v?localStorage.setItem('s12_lg_'+k,String(v)):localStorage.removeItem('s12_lg_'+k)}

function openModal(){
  var mx=gmx();
  document.getElementById('mgrid').innerHTML=MAXCFG.map(function(c){
    return '<div class="mfield"><div class="mlabel">'+c.label+'</div>'+(c.sub?'<div class="msub">'+c.sub+'</div>':'')+'<div class="mwrap"><input class="minput" type="number" step="2.5" min="0" id="mi_'+c.k+'" value="'+(mx[c.k]||'')+'" placeholder="0"><span class="munit">kg</span></div></div>';
  }).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function saveAndClose(){
  var m={};
  MAXCFG.forEach(function(c){m[c.k]=parseFloat(document.getElementById('mi_'+c.k).value)||0});
  smx(m);closeModal();render();
}
function clearLogs(){
  if(!confirm('Delete all logged weights? Cannot be undone.'))return;
  Object.keys(localStorage).filter(function(k){return k.startsWith('s12_lg_')}).forEach(function(k){localStorage.removeItem(k)});
  render();
}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

function wcell(spec,w,d,i){
  var mx=gmx();
  var lk=w+'_'+d+'_'+i;
  var logged=glog(lk);
  var prev=w>1?glog((w-1)+'_'+d+'_'+i):'';

  if(spec&&spec.p){
    var mv=mx[spec.r]||0;
    var nm=MAXFULL[spec.r]||spec.r;
    if(mv>0){
      var kg=Math.round(mv*spec.p/100/2.5)*2.5;
      return '<div class="ckg">'+kg+'kg</div><div class="cpct">'+spec.p+'% '+nm+'</div>';
    }
    return '<div class="nomax">'+spec.p+'% '+nm+'</div><button class="addmax" onclick="openModal()">Set your max &#8599;</button>';
  }
  if(spec&&spec.test){
    var ph=prev?'<div class="prevlog">&#8593; W'+(w-1)+': '+prev+'kg</div>':'';
    return '<div class="testkg">Build to heavy single</div><input class="loginput" type="number" step="2.5" min="0" value="'+logged+'" placeholder="achieved kg" oninput="slog(\''+lk+'\',this.value)">'+ph;
  }
  if(spec&&spec.bag){
    var ph2=prev?'<div class="prevlog">&#8593; W'+(w-1)+': '+prev+'</div>':'';
    return '<div class="bagkg">'+spec.bag+'kg bag</div><input class="loginput loginput-txt" type="text" value="'+logged+'" placeholder="notes" oninput="slog(\''+lk+'\',this.value)">'+ph2;
  }
  if(spec&&spec.e){
    var ph3=prev?'<div class="prevlog">&#8593; W'+(w-1)+': '+prev+'kg</div>':'';
    return '<span class="rpebdg">RPE '+spec.e+'</span><input class="loginput" type="number" step="any" min="0" value="'+logged+'" placeholder="kg" oninput="slog(\''+lk+'\',this.value)">'+ph3;
  }
  var label=spec==='bw'?'Bodyweight':(spec||'—');
  return '<span class="bwtag">'+label+'</span>';
}

function rtable(w,d){
  var rows=DATA[w][d].map(function(ex,i){
    var nm=ex[0],mod=ex[1],sr=ex[2],ws=ex[3],rest=ex[4],notes=ex[5],isNew=ex[6];
    var noteHtml=notes?notes.split('. ').filter(Boolean).map(function(s){return s+'.'}).join('<br>'):'';
    return '<tr>'
      +'<td><div class="exname">'+nm+(isNew?'<span class="nbdg">Phase up</span>':'')+'</div>'+(mod?'<div class="exmod">'+mod+'</div>':'')+'</td>'
      +'<td><span class="srbdg">'+sr+'</span></td>'
      +'<td>'+wcell(ws,w,d,i)+'</td>'
      +'<td class="restcell">'+rest+'</td>'
      +'<td class="notecell">'+noteHtml+'</td>'
      +'</tr>';
  }).join('');
  return '<table><thead><tr><th>Exercise</th><th>Sets x Reps</th><th>Weight</th><th>Rest</th><th>Notes</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function render(){
  var mx=gmx();
  var anyMax=Object.values(mx).some(function(v){return v>0});
  document.getElementById('promptBar').innerHTML=anyMax?'':'<div class="prompt-bar" onclick="openModal()">&#9889; Add your 1RM maxes to auto-calculate training weights &#8594;</div>';
  document.getElementById('maxesBar').innerHTML=anyMax?
    MAXCFG.filter(function(c){return mx[c.k]>0}).map(function(c){return '<span class="max-chip">'+MAXSHORT[c.k]+': '+mx[c.k]+'kg</span>'}).join(''):'';
  document.getElementById('weekNav').innerHTML=Array.from({length:12},function(_,i){
    var w=i+1;
    return '<button class="wbtn'+(CW===w?' on':'')+'" onclick="sw('+w+')">W'+w+'</button>';
  }).join('');
  document.getElementById('wLabel').textContent='Week '+CW;
  var ph=CW<=4?0:CW<=8?1:CW<=11?2:3;
  var pb=document.getElementById('phaseBadge');
  pb.textContent=PHASE_LABELS[ph];
  pb.className='phase-badge ph-'+ph;
  document.getElementById('wTheme').textContent=THEMES[CW-1];
  document.getElementById('dayTabs').innerHTML=DLABELS.map(function(l,i){
    var d=i+1;
    return '<button class="dtab'+(CD===d?' on':'')+'" onclick="sd('+d+')">'+l+'</button>';
  }).join('');
  document.getElementById('dayPanel').innerHTML=rtable(CW,CD);
}
function sw(w){CW=w;render()}
function sd(d){CD=d;render()}

// ── PROGRAMME GENERATOR ──────────────────────────────────────────────────────
function buildWeek(w){
  var ph=w<=4?0:w<=8?1:w<=11?2:3;
  var pcts=[65,67.5,70,72.5,75,77.5,80,82.5,85,87.5,90,null];
  var pct=pcts[w-1];
  var isTest=w===12;
  var ms=function(r){return isTest?{test:true}:{p:pct,r:r}};
  var msr=isTest?'Work to heavy single':['5x5','4x4','3x3'][Math.min(ph,2)];
  var dlsr=isTest?'Work to heavy single':['5x3','4x3','3x2'][Math.min(ph,2)];
  var sb=w<=6?60:80;
  var isNew=ph>0&&[5,9,12].indexOf(w)>-1;

  // Accessory volume by phase
  var lpd=['3x12','4x10','4x8'][Math.min(ph,2)];
  var skull=['3x12','3x10','3x8'][Math.min(ph,2)];
  var crow=['4x10','4x8','4x6'][Math.min(ph,2)];
  var curl=['3x12','3x10','3x8'][Math.min(ph,2)];
  var tri=['3x15','3x12','3x10'][Math.min(ph,2)];
  var mace=['3x10 each','3x12 each','3x15 each'][Math.min(ph,2)];
  var ssbs=['3x8','4x6','3x5'][Math.min(ph,2)];

  // Sandbag volume
  var sbDLsr=w<=6?'5x3':w<=8?'4x3':'4x3';
  var sbShsr=w<=6?'5x3 each':w<=8?'4x3 each':'3x3 each';
  var sbCarry=w<=4?'4x20m':w<=6?'4x25m':w<=8?'4x20m':'4x25m';
  var sbHold=w<=4?'4x30s':w<=6?'4x40s':w<=8?'4x30s':'4x40s';
  var sbZerch=w<=4?'3x30s':w<=6?'3x40s':w<=8?'3x30s':'3x40s';

  // Notes by phase
  var sqN=['Film from the side. Check depth and knee tracking each set.','Heavier loads — same standards. Drive knees out, chest up.','Max intensity. Every rep with full focus and intent.','Warm up thoroughly. Singles at 70 / 80 / 90 / 95% then go for it.'][ph];
  var bN=['Set up the same every single time. Arch, leg drive, tight wrists.','Increase load. Wrists vertical over elbows throughout.','Low reps, high tension. Control the descent — no bouncing.','Work up methodically. Reset and breathe between every attempt.'][ph];
  var dlN=['Lats tight, big breath, drive floor away. Slow and deliberate.','Heavier now. Same setup every rep. No rushing.','Near-max territory. Full reset between every rep.','Take your time between singles. Film from the side.'][ph];
  var ohpN=['Vertical torso, full lockout every rep. No leg drive.','Heavier loads — brace harder. Bar path stays vertical.','Max effort. Squeeze glutes and abs hard before each rep.','Warm up shoulders well. Build up single attempts carefully.'][ph];

  if(isTest){
    return{
      1:[
        ['Back Squat','Build to heavy single','1-3 singles',{test:true},'As needed',sqN,false],
        ['SSB Good Morning','','2x10',{e:6},'90s','Light. Stay loose after heavy squats.',false],
        ['Lat Pulldown','',lpd,{e:7},'60s','',false],
        ['Club Halo','plate-loaded','2x10 each',{e:7},'60s','',false],
      ],
      2:[
        ['Bench Press','Build to heavy single','1-3 singles',{test:true},'As needed',bN,false],
        ['Cable Row','','3x10',{e:7},'60s','',false],
        ['EZ Bar Curl','','3x10',{e:7},'60s','',false],
        ['Sandbag Bear Hug Hold',sb+'kg bag','3x30s',{bag:sb},'90s','Grip finisher.',false],
      ],
      3:[
        ['Deadlift','Build to heavy single','1-3 singles',{test:true},'As needed',dlN,false],
        ['SSB Squat','','2x8',{e:6},'2 min','Light.',false],
        ['Tricep Pushdown','','3x12',{e:7},'60s','',false],
      ],
      4:[
        ['Strict Press','Build to heavy single','1-3 singles',{test:true},'As needed',ohpN,false],
        ['Bench Press','secondary','3x8',{e:7},'2 min','Sub-max. Control the descent.',false],
        ['Sandbag Bear Hug Carry',sb+'kg bag','3x20m',{bag:sb},'2 min','Final session. Make it count.',false],
        ['Plate Mace Swing','','3x10 each',{e:7},'60s','',false],
      ],
    };
  }

  return{
