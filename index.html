<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MST Systems — Enter Strongman</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --black: #0d0d0d;
    --dark: #161616;
    --card: #1e1e1e;
    --border: #2e2e2e;
    --accent: #e8c84a;
    --accent2: #c44a2a;
    --text: #e8e4de;
    --muted: #888;
    --green: #4aac6e;
    --blue: #5a9fd4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--dark);
    border-bottom: 3px solid var(--accent);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 200;
  }

  .header-inner {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    flex: 1;
  }

  .maxes-toggle {
    background: rgba(232,200,74,0.12);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .maxes-toggle:hover { background: rgba(232,200,74,0.22); }
  .maxes-toggle.has-maxes { border-color: var(--green); color: var(--green); background: rgba(74,172,110,0.1); }

  /* Maxes Panel */
  .maxes-panel {
    background: #111;
    border-bottom: 2px solid var(--border);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
    position: sticky;
    top: 51px;
    z-index: 190;
  }
  .maxes-panel.open { max-height: 200px; }

  .maxes-inner {
    max-width: 1000px;
    margin: 0 auto;
    padding: 14px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
  }

  .max-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 90px;
  }

  .max-field label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .max-input-wrap {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .max-input-wrap:focus-within { border-color: var(--accent); }

  .max-input-wrap input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    width: 60px;
    padding: 5px 8px;
    text-align: right;
  }

  .max-input-wrap span {
    font-size: 11px;
    color: var(--muted);
    padding-right: 7px;
    font-weight: 600;
  }

  .save-maxes-btn {
    background: var(--accent);
    border: none;
    color: var(--black);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    align-self: flex-end;
    transition: opacity 0.15s;
  }
  .save-maxes-btn:hover { opacity: 0.85; }

  .maxes-note {
    font-size: 11px;
    color: var(--muted);
    align-self: center;
    margin-left: 4px;
    font-style: italic;
  }

  /* Main layout */
  .main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 16px 12px 60px;
  }

  .week-nav {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .week-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.12s;
    text-transform: uppercase;
  }
  .week-btn:hover { border-color: var(--accent); color: var(--accent); }
  .week-btn.active { background: var(--accent); border-color: var(--accent); color: var(--black); }

  .week-summary {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .week-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: var(--text);
    line-height: 1;
  }

  .week-theme {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }

  .day-tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .day-tab {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    text-transform: uppercase;
    transition: all 0.12s;
  }
  .day-tab:hover { color: var(--text); }
  .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .day-panel {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }

  thead { background: #111; }

  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 9px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #232323;
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  tbody td {
    padding: 10px 10px;
    vertical-align: middle;
  }

  .ex-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .ex-mod {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-style: italic;
  }

  .badge-sr {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    white-space: nowrap;
  }

  /* Weight cell */
  .w-calc {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--green);
    white-space: nowrap;
  }

  .w-calc .pct-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }

  .w-no-max {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    cursor: pointer;
    border-bottom: 1px dashed var(--border);
    display: inline-block;
    transition: color 0.15s;
  }
  .w-no-max:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .w-rpe {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: #666;
    white-space: nowrap;
  }

  .rest-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
  }

  .notes-cell {
    font-size: 11.5px;
    color: #999;
    max-width: 240px;
    line-height: 1.5;
  }

  .notes-cell ul { padding-left: 12px; }
  .notes-cell li { margin-bottom: 2px; }

  .new-cue {
    display: inline-block;
    background: rgba(196,74,42,0.15);
    color: var(--accent2);
    font-size: 9px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Log cell */
  .log-cell { min-width: 90px; }

  .log-wrap {
    display: flex;
    align-items: center;
    background: #151515;
    border: 1.5px solid #2a2a2a;
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.15s;
    max-width: 100px;
  }
  .log-wrap:focus-within { border-color: var(--blue); }
  .log-wrap.saved { border-color: var(--green); transition: border-color 0.1s; }

  .log-wrap input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    width: 56px;
    padding: 5px 6px;
    text-align: right;
  }

  .log-wrap input::placeholder { color: #333; font-size: 14px; }

  .log-wrap .log-unit {
    font-size: 11px;
    color: var(--muted);
    padding-right: 6px;
    flex-shrink: 0;
  }

  .log-date {
    font-size: 9px;
    color: #444;
    margin-top: 3px;
    white-space: nowrap;
  }

  /* Key bar */
  .key-bar {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    background: var(--dark);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 12px;
    font-size: 10px;
    color: var(--muted);
    align-items: center;
  }

  .key-item { display: flex; align-items: center; gap: 5px; }
  .key-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  @media (max-width: 640px) {
    .notes-cell { display: none; }
    thead th.notes-col { display: none; }
    .subtitle { display: none; }
    .main { padding: 12px 8px 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">MST</span>
    <span class="subtitle">Enter Strongman — 8 Week Programme</span>
    <button class="maxes-toggle" id="maxesToggle" onclick="toggleMaxes()">⚡ Set My Maxes</button>
  </div>
</header>

<div class="maxes-panel" id="maxesPanel">
  <div class="maxes-inner">
    <div class="max-field">
      <label>Squat</label>
      <div class="max-input-wrap">
        <input type="number" id="max-squat" placeholder="0" min="0" step="2.5">
        <span>kg</span>
      </div>
    </div>
    <div class="max-field">
      <label>Bench</label>
      <div class="max-input-wrap">
        <input type="number" id="max-bench" placeholder="0" min="0" step="2.5">
        <span>kg</span>
      </div>
    </div>
    <div class="max-field">
      <label>Deadlift</label>
      <div class="max-input-wrap">
        <input type="number" id="max-deadlift" placeholder="0" min="0" step="2.5">
        <span>kg</span>
      </div>
    </div>
    <div class="max-field">
      <label>Strict Press</label>
      <div class="max-input-wrap">
        <input type="number" id="max-strictPress" placeholder="0" min="0" step="2.5">
        <span>kg</span>
      </div>
    </div>
    <div class="max-field">
      <label>Push Press</label>
      <div class="max-input-wrap">
        <input type="number" id="max-pushPress" placeholder="0" min="0" step="2.5">
        <span>kg</span>
      </div>
    </div>
    <button class="save-maxes-btn" onclick="saveMaxes()">Save</button>
    <span class="maxes-note" id="maxesSaveNote"></span>
  </div>
</div>

<div class="main">
  <div class="key-bar">
    <div class="key-item"><div class="key-dot" style="background:var(--green)"></div>Calculated from your max</div>
    <div class="key-item"><div class="key-dot" style="background:var(--accent)"></div>Sets × Reps</div>
    <div class="key-item"><div class="key-dot" style="background:var(--blue)"></div>Log what you used</div>
    <div class="key-item"><div class="key-dot" style="background:var(--accent2)"></div>New cue this week</div>
    <div class="key-item" style="margin-left:auto; letter-spacing:0.05em">D1: Pull &nbsp;·&nbsp; D2: Press &nbsp;·&nbsp; D3: Squat/DL &nbsp;·&nbsp; D4: Events</div>
  </div>

  <div class="week-nav" id="weekNav"></div>

  <div class="week-summary">
    <div class="week-label" id="weekLabel">Week 1</div>
    <div class="week-theme" id="weekTheme"></div>
  </div>

  <div class="day-tabs" id="dayTabs"></div>
  <div class="day-panel" id="dayPanel"></div>
</div>

<script>
// ─── STORAGE ────────────────────────────────────────────────────────────────
let maxes = { squat: 0, bench: 0, deadlift: 0, strictPress: 0, pushPress: 0 };

async function loadMaxes() {
  try {
    const r = await window.storage.get('maxes');
    if (r && r.value) maxes = JSON.parse(r.value);
  } catch(e) {}
  populateMaxInputs();
  updateMaxesToggleStyle();
}

async function saveMaxes() {
  maxes.squat      = parseFloat(document.getElementById('max-squat').value) || 0;
  maxes.bench      = parseFloat(document.getElementById('max-bench').value) || 0;
  maxes.deadlift   = parseFloat(document.getElementById('max-deadlift').value) || 0;
  maxes.strictPress= parseFloat(document.getElementById('max-strictPress').value) || 0;
  maxes.pushPress  = parseFloat(document.getElementById('max-pushPress').value) || 0;
  try {
    await window.storage.set('maxes', JSON.stringify(maxes));
    const note = document.getElementById('maxesSaveNote');
    note.textContent = '✓ Saved';
    note.style.color = 'var(--green)';
    setTimeout(() => { note.textContent = ''; }, 2000);
  } catch(e) {
    document.getElementById('maxesSaveNote').textContent = 'Save failed';
  }
  updateMaxesToggleStyle();
  renderTable();
}

function populateMaxInputs() {
  ['squat','bench','deadlift','strictPress','pushPress'].forEach(k => {
    const el = document.getElementById('max-' + k);
    if (el && maxes[k]) el.value = maxes[k];
  });
}

function updateMaxesToggleStyle() {
  const btn = document.getElementById('maxesToggle');
  const hasAny = Object.values(maxes).some(v => v > 0);
  btn.classList.toggle('has-maxes', hasAny);
  if (hasAny) btn.textContent = '⚡ My Maxes';
  else btn.textContent = '⚡ Set My Maxes';
}

let maxesPanelOpen = false;
function toggleMaxes() {
  maxesPanelOpen = !maxesPanelOpen;
  document.getElementById('maxesPanel').classList.toggle('open', maxesPanelOpen);
}

// ─── LOG STORAGE ────────────────────────────────────────────────────────────
const logCache = {};

function logKey(week, day, exIdx) {
  return `log:w${week}d${day}e${exIdx}`;
}

async function loadLogsForDay(week, day, count) {
  for (let i = 0; i < count; i++) {
    const k = logKey(week, day, i);
    if (logCache[k] === undefined) {
      try {
        const r = await window.storage.get(k);
        logCache[k] = r ? JSON.parse(r.value) : null;
      } catch(e) { logCache[k] = null; }
    }
  }
}

async function saveLog(week, day, exIdx, weight) {
  const k = logKey(week, day, exIdx);
  if (!weight) {
    logCache[k] = null;
    try { await window.storage.delete(k); } catch(e) {}
    return;
  }
  const entry = { weight, date: new Date().toISOString().slice(0,10) };
  logCache[k] = entry;
  try { await window.storage.set(k, JSON.stringify(entry)); } catch(e) {}
}

// ─── CALC ───────────────────────────────────────────────────────────────────
function calcWeight(pct, maxKey) {
  const base = maxes[maxKey] || 0;
  if (!base) return null;
  // Round to nearest 1.25kg (quarter plate)
  return Math.round((base * pct / 100) / 1.25) * 1.25;
}

function fmtWeight(w) {
  // Show as integer if whole, otherwise 1dp
  return w % 1 === 0 ? w.toString() : w.toFixed(2).replace(/\.?0+$/, '');
}

// [name, mod, sr, weightStr, rest, notes, isNew, pct, maxKey]

    ],

      ["Front Squat","Speed — onto toes","8×2","50% 1RM","45s","+2 sets. Fully extend onto toes using squat power — not a calf raise.",false,50,"squat"],
      ["Push Press","","10×3","60% 1RM","60s","+2 sets. Tight rack, power from legs.",false,60,"pushPress"],

const weekThemes = [
  "Intro: Positions & Technique",
  "Consolidation: Refine Positions",
  "Chin Tuck & Hip Drive",
  "Drill the Cues",
  "Upper Back & Vertical Torso",
  "Load Up & Refine",
  "Bring It All Together",
  "Final Week: Maximum Effort"
];

const dayLabels = ["Day 1 — Pull","Day 2 — Press","Day 3 — Squat / DL","Day 4 — Events"];

let currentWeek = 1;
let currentDay = 1;

// ─── RENDER ─────────────────────────────────────────────────────────────────
function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  for (let w = 1; w <= 8; w++) {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (w === currentWeek ? ' active' : '');
    btn.textContent = `W${w}`;
    btn.onclick = () => { currentWeek = w; render(); };
    nav.appendChild(btn);
  }
}

function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  for (let d = 1; d <= 4; d++) {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d === currentDay ? ' active' : '');
    btn.textContent = dayLabels[d-1];
    btn.onclick = () => { currentDay = d; render(); };
    tabs.appendChild(btn);
  }
}

function renderTable() {
  const panel = document.getElementById('dayPanel');
  const exercises = program[currentWeek][currentDay];

  let rows = exercises.map((ex, i) => {
    const [name, mod, sr, weightStr, rest, notes, isNew, pct, maxKey] = ex;
    const k = logKey(currentWeek, currentDay, i);
    const logged = logCache[k];

    // Weight cell
    let weightCell;
    if (pct && maxKey) {
      const calc = calcWeight(pct, maxKey);
      if (calc) {
        const maxLabel = {squat:'Squat',deadlift:'Deadlift',strictPress:'Strict Press',pushPress:'Push Press',bench:'Bench'}[maxKey];
        weightCell = `<div class="w-calc">${fmtWeight(calc)}<span class="kg-unit">kg</span><span class="pct-label">${pct}% of ${maxLabel}</span></div>`;
      } else {
        const maxLabel = {squat:'squat',deadlift:'deadlift',strictPress:'strict press',pushPress:'push press',bench:'bench'}[maxKey];
        weightCell = `<div class="w-no-max" onclick="openMaxes('${maxKey}')">${pct}% — set ${maxLabel} max ↑</div>`;
      }
    } else {
      weightCell = `<div class="w-rpe">${weightStr}</div>`;
    }

    // Notes
    const noteItems = notes ? notes.split('. ').filter(Boolean).map(n => `<li>${n.endsWith('.') ? n : n + '.'}</li>`).join('') : '';

    // Log input
    const logVal = logged ? logged.weight : '';
    const logDate = logged ? `<div class="log-date">${logged.date}</div>` : '';

    return `<tr>
      <td>
        <div class="ex-name">${name}${isNew ? '<span class="new-cue">New Cue</span>' : ''}</div>
        ${mod ? `<div class="ex-mod">${mod}</div>` : ''}
      </td>
      <td><span class="badge-sr">${sr}</span></td>
      <td>${weightCell}</td>
      <td><span class="rest-cell">${rest}</span></td>
      <td class="notes-cell">${noteItems ? `<ul>${noteItems}</ul>` : ''}</td>
      <td class="log-cell">
        <div class="log-wrap" id="logwrap-${i}">
          <input type="number" 
            class="log-input" 
            id="loginput-${i}" 
            placeholder="—" 
            min="0" 
            step="2.5"
            value="${logVal}"
            onchange="handleLog(${i}, this)"
            onblur="handleLog(${i}, this)"
          >
          <span class="log-unit">kg</span>
        </div>
        ${logDate}
      </td>
    </tr>`;
  }).join('');

  panel.innerHTML = `<table>
    <thead>
      <tr>
        <th>Exercise</th>
        <th>Sets × Reps</th>
        <th>Weight</th>
        <th>Rest</th>
        <th class="notes-col">Key Notes</th>
        <th>Used</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function handleLog(exIdx, input) {
  const val = parseFloat(input.value) || 0;
  const wrap = document.getElementById('logwrap-' + exIdx);
  await saveLog(currentWeek, currentDay, exIdx, val || null);
  if (val) {
    wrap.classList.add('saved');
    setTimeout(() => wrap.classList.remove('saved'), 1200);
  }
}

function openMaxes(maxKey) {
  maxesPanelOpen = true;
  document.getElementById('maxesPanel').classList.add('open');
  const input = document.getElementById('max-' + maxKey);
  if (input) { input.focus(); input.select(); }
}

async function render() {
  renderWeekNav();
  renderDayTabs();
  document.getElementById('weekLabel').textContent = `Week ${currentWeek}`;
  document.getElementById('weekTheme').textContent = weekThemes[currentWeek-1];
  const exCount = program[currentWeek][currentDay].length;
  await loadLogsForDay(currentWeek, currentDay, exCount);
  renderTable();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(async () => {
  await loadMaxes();
  await render();
})();
